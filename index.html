<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>CitSure — Life in the UK Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light;
    --ink:#16233D; --ink-2:#25395C;
    --paper:#EFF2F6; --surface:#FFFFFF; --line:#DCE2EC;
    --text:#1B2436; --muted:#5C6880;
    --go:#1A7F5A; --go-soft:#E4F2EC;
    --warn:#B5742A;
    --miss:#B23A48; --miss-soft:#F8E8EA;
    --radius:14px; --maxw:680px;
    --shadow:0 1px 2px rgba(22,35,61,.06), 0 8px 24px rgba(22,35,61,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{height:100%;background:var(--paper)}
  body{
    min-height:100%;
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    color:var(--text); background:var(--paper);
    line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em;line-height:1.04}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:24px 20px 64px}
  .eyebrow{font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--ink);color:#fff;font-weight:600;font-size:1rem;
    padding:14px 22px;border-radius:11px;transition:transform .12s ease,background .12s ease;
  }
  .btn:hover{background:var(--ink-2)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .btn.ghost:hover{background:#fff;border-color:var(--ink)}
  :focus-visible{outline:3px solid #9cc6e0;outline-offset:2px;border-radius:8px}

  /* ---------- START ---------- */
  .hero{padding:48px 0 8px}
  .mark{display:inline-flex;align-items:center;gap:10px;margin-bottom:40px}
  .mark .dot{width:30px;height:30px;border-radius:8px;background:var(--ink);
    display:grid;place-items:center;color:#fff;font-family:'Bricolage Grotesque';font-weight:800;font-size:1rem}
  .mark .name{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.05rem;color:var(--ink)}
  .hero h1{font-size:clamp(2.1rem,7vw,3.1rem);font-weight:800;color:var(--ink);margin-bottom:16px}
  .hero p.lead{font-size:1.12rem;color:var(--muted);max-width:34ch;margin-bottom:32px}
  .facts{display:flex;gap:0;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--surface);overflow:hidden;margin-bottom:28px;box-shadow:var(--shadow)}
  .fact{flex:1;padding:18px 16px;text-align:center;border-right:1px solid var(--line)}
  .fact:last-child{border-right:none}
  .fact .num{font-family:'Bricolage Grotesque';font-weight:800;font-size:1.8rem;color:var(--ink);display:block}
  .fact .lbl{font-size:.78rem;color:var(--muted);margin-top:2px}
  .note{font-size:.8rem;color:var(--muted);margin-top:22px;padding-top:18px;border-top:1px solid var(--line)}
  .guide-link{margin-top:18px;font-size:.95rem}
  .guide-link a{color:var(--ink);font-weight:600;text-decoration:none;border-bottom:1.5px solid var(--line);padding-bottom:2px}
  .guide-link a:hover{border-color:var(--ink)}

  /* ---------- TEST ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:14px 0;position:sticky;top:0;background:var(--paper);z-index:5}
  .progress-meta{font-size:.85rem;color:var(--muted);font-weight:500}
  .progress-meta b{color:var(--ink);font-weight:700}
  .timer{display:inline-flex;align-items:center;gap:7px;font-variant-numeric:tabular-nums;
    font-weight:600;font-size:.95rem;color:var(--ink);background:var(--surface);
    border:1px solid var(--line);border-radius:999px;padding:7px 14px}
  .timer.low{color:var(--miss);border-color:var(--miss)}
  .timer .dotpulse{width:8px;height:8px;border-radius:50%;background:var(--go)}
  .timer.low .dotpulse{background:var(--miss)}
  .track{height:5px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:26px}
  .track>span{display:block;height:100%;background:var(--go);transition:width .3s ease}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:26px 24px;box-shadow:var(--shadow)}
  .q-cat{margin-bottom:14px}
  .q-text{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.4rem;color:var(--ink);margin-bottom:6px}
  .q-hint{font-size:.85rem;color:var(--warn);font-weight:600;margin-bottom:18px}
  .opts{display:flex;flex-direction:column;gap:12px;margin-top:18px}
  .opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;
    background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:15px 16px;
    font-size:1.02rem;color:var(--text);transition:border-color .12s,background .12s}
  .opt:hover{border-color:var(--ink-2)}
  .opt .key{flex:none;width:28px;height:28px;border-radius:7px;background:var(--paper);
    display:grid;place-items:center;font-weight:700;font-size:.85rem;color:var(--muted)}
  .opt.sel{border-color:var(--ink);background:#F4F7FB}
  .opt.sel .key{background:var(--ink);color:#fff}

  .testnav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:24px}
  .flagbtn{font-weight:600;font-size:.9rem;color:var(--muted);display:inline-flex;align-items:center;gap:7px}
  .flagbtn.on{color:var(--warn)}

  /* ---------- RESULTS ---------- */
  .verdict{background:var(--ink);color:#fff;border-radius:var(--radius);padding:32px 26px;margin-bottom:22px}
  .verdict.pass{background:var(--go)}
  .verdict .eyebrow{color:rgba(255,255,255,.7)}
  .verdict h2{font-family:'Bricolage Grotesque';font-weight:800;font-size:2.2rem;margin:8px 0 4px}
  .verdict .score-line{font-size:1.05rem;color:rgba(255,255,255,.9)}
  .verdict .score-line b{font-size:1.05rem}

  .meter-wrap{margin:22px 0 4px}
  .meter{position:relative;height:34px;background:var(--paper);border:1px solid var(--line);
    border-radius:8px;overflow:hidden}
  .meter>.fill{height:100%;background:var(--go);transition:width .6s ease}
  .meter>.fill.fail{background:var(--miss)}
  .passline{position:absolute;top:-6px;bottom:-6px;width:2px;background:var(--ink)}
  .passline span{position:absolute;top:-20px;left:50%;transform:translateX(-50%);
    white-space:nowrap;font-size:.7rem;font-weight:700;color:var(--ink)}
  .meter-scale{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:6px}

  .section-h{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.15rem;color:var(--ink);
    margin:34px 0 14px}
  .topic{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--line)}
  .topic:last-child{border-bottom:none}
  .topic .name{flex:none;width:128px;font-size:.92rem;font-weight:600;color:var(--text)}
  .topic .bar{flex:1;height:9px;background:var(--paper);border-radius:999px;overflow:hidden}
  .topic .bar>span{display:block;height:100%;background:var(--go)}
  .topic .bar>span.low{background:var(--warn)}
  .topic .bar>span.bad{background:var(--miss)}
  .topic .frac{flex:none;width:48px;text-align:right;font-size:.85rem;font-weight:600;
    font-variant-numeric:tabular-nums;color:var(--muted)}

  .review-item{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:18px 18px;margin-bottom:12px}
  .review-item .q{font-weight:600;color:var(--ink);margin-bottom:12px}
  .review-item .ans{display:flex;gap:9px;align-items:flex-start;font-size:.95rem;margin:5px 0;padding:8px 11px;border-radius:8px}
  .ans.right{background:var(--go-soft);color:#0f5e41}
  .ans.wrong{background:var(--miss-soft);color:#8d2b37}
  .ans .tick{font-weight:700}
  .review-item .exp{font-size:.9rem;color:var(--muted);margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
  .results-actions{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}

  @media (max-width:480px){
    .fact .num{font-size:1.4rem}
    .q-text{font-size:1.22rem}
    .topic .name{width:96px;font-size:.85rem}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* ============================================================
   QUESTION BANK  (30 original, fact-checked sample questions)
   Same shape as question-bank.json — swap inline array for
   fetch('question-bank.json') when you wire up the real bank.
   ============================================================ */
let BANK = [
  {id:"hist-01",category:"history",tier:1,type:"single",question:"In which year did the Battle of Hastings take place?",options:["1066","966","1166","1266"],answer:0,explanation:"William of Normandy defeated King Harold at the Battle of Hastings in 1066, beginning Norman rule in England."},
  {id:"hist-02",category:"history",tier:2,type:"single",question:"Which document, agreed in 1215, limited the power of the monarch?",options:["The Bill of Rights","Magna Carta","The Domesday Book","The Act of Union"],answer:1,explanation:"Magna Carta, agreed by King John in 1215, established that the king was subject to the law rather than above it."},
  {id:"hist-03",category:"history",tier:2,type:"single",question:"During whose reign was the Spanish Armada defeated in 1588?",options:["Elizabeth I","Mary I","Victoria","Anne"],answer:0,explanation:"The Spanish Armada was defeated in 1588 during the reign of Elizabeth I."},
  {id:"hist-04",category:"history",tier:3,type:"single",question:"Who commanded the British fleet to victory at the Battle of Trafalgar in 1805?",options:["The Duke of Wellington","Admiral Nelson","Oliver Cromwell","Sir Francis Drake"],answer:1,explanation:"Admiral Nelson led the British navy to victory at Trafalgar in 1805. He was killed in the battle and is commemorated by Nelson's Column in London."},
  {id:"hist-05",category:"history",tier:3,type:"single",question:"Who led the British and allied forces that defeated Napoleon at Waterloo in 1815?",options:["Admiral Nelson","The Duke of Wellington","William Pitt","Robert Walpole"],answer:1,explanation:"The Duke of Wellington commanded the allied forces that defeated Napoleon at the Battle of Waterloo in 1815."},
  {id:"hist-06",category:"history",tier:1,type:"single",question:"In which year did the Great Fire of London occur?",options:["1066","1666","1766","1566"],answer:1,explanation:"The Great Fire of London took place in 1666, destroying much of the city."},
  {id:"hist-07",category:"history",tier:2,type:"single",question:"The Gunpowder Plot of 1605 was a failed attempt to do what?",options:["Invade Scotland","Blow up the Houses of Parliament","Assassinate the Pope","Burn down London"],answer:1,explanation:"In 1605 a group including Guy Fawkes tried to blow up the Houses of Parliament. The failed plot is remembered every year on Bonfire Night, 5 November."},
  {id:"hist-08",category:"history",tier:3,type:"single",question:"The Act of Union of 1707 joined England with which other nation to form Great Britain?",options:["Ireland","Wales","Scotland","France"],answer:2,explanation:"The Act of Union of 1707 united England (and Wales) with Scotland, creating the Kingdom of Great Britain."},
  {id:"hist-09",category:"history",tier:4,type:"single",question:"In which year did women over the age of 30 first gain the right to vote in the UK?",options:["1832","1918","1928","1945"],answer:1,explanation:"Women over 30 won the right to vote in 1918. Voting was made equal to men, at age 21, in 1928."},
  {id:"hist-10",category:"history",tier:2,type:"single",question:"In which year was the National Health Service (NHS) established?",options:["1928","1948","1958","1968"],answer:1,explanation:"The NHS was founded in 1948, providing healthcare free at the point of use."},
  {id:"hist-11",category:"history",tier:3,type:"single",question:"The Domesday Book, a survey of England, was ordered by which king?",options:["Henry VIII","Richard the Lionheart","William the Conqueror","King John"],answer:2,explanation:"William the Conqueror ordered the Domesday Book in 1086 to record landholdings across England."},
  {id:"hist-12",category:"history",tier:3,type:"single",question:"Henry VIII broke away from the Church of Rome and established which church?",options:["The Church of Scotland","The Church of England","The Methodist Church","The Quakers"],answer:1,explanation:"Henry VIII's break with Rome led to the founding of the Church of England, with the monarch as its head."},
  {id:"uk-01",category:"uk-overview",tier:1,type:"single",question:"Which of the following is NOT part of the United Kingdom?",options:["Scotland","Wales","Northern Ireland","The Republic of Ireland"],answer:3,explanation:"The UK is made up of England, Scotland, Wales and Northern Ireland. The Republic of Ireland is an independent country."},
  {id:"uk-02",category:"uk-overview",tier:2,type:"single",question:"What is the capital city of Wales?",options:["Swansea","Cardiff","Newport","Bangor"],answer:1,explanation:"Cardiff is the capital of Wales and home to the Senedd, the Welsh Parliament."},
  {id:"uk-03",category:"uk-overview",tier:2,type:"single",question:"What is the capital city of Scotland?",options:["Glasgow","Aberdeen","Edinburgh","Dundee"],answer:2,explanation:"Edinburgh is the capital of Scotland and the seat of the Scottish Parliament at Holyrood."},
  {id:"uk-04",category:"uk-overview",tier:1,type:"single",question:"What is the currency of the UK?",options:["The euro","The pound sterling","The dollar","The krona"],answer:1,explanation:"The currency of the UK is the pound sterling (£), divided into 100 pence."},
  {id:"uk-05",category:"uk-overview",tier:3,type:"single",question:"What is the highest mountain in the UK?",options:["Snowdon","Scafell Pike","Ben Nevis","Slieve Donard"],answer:2,explanation:"Ben Nevis, in the Scottish Highlands, is the highest mountain in the UK."},
  {id:"soc-01",category:"society",tier:2,type:"single",question:"Who is the patron saint of Scotland?",options:["St George","St Andrew","St David","St Patrick"],answer:1,explanation:"St Andrew is the patron saint of Scotland. (George — England, David — Wales, Patrick — Northern Ireland.)"},
  {id:"soc-02",category:"society",tier:2,type:"single",question:"On what date is St David's Day celebrated?",options:["1 March","17 March","23 April","30 November"],answer:0,explanation:"St David's Day, celebrating the patron saint of Wales, is held on 1 March."},
  {id:"soc-03",category:"society",tier:1,type:"single",question:"Which flower is traditionally associated with England?",options:["The thistle","The daffodil","The rose","The shamrock"],answer:2,explanation:"The rose is the national flower of England. (Scotland — thistle, Wales — daffodil, Northern Ireland — shamrock.)"},
  {id:"soc-04",category:"society",tier:3,type:"single",question:"Which Scottish poet wrote the words to 'Auld Lang Syne'?",options:["William Wordsworth","Robert Burns","Dylan Thomas","Walter Scott"],answer:1,explanation:"Robert Burns, Scotland's national poet, wrote 'Auld Lang Syne', traditionally sung at New Year."},
  {id:"soc-05",category:"society",tier:3,type:"single",question:"In which town was William Shakespeare born?",options:["Canterbury","Stratford-upon-Avon","Oxford","York"],answer:1,explanation:"Shakespeare was born in Stratford-upon-Avon, where his birthplace is still visited today."},
  {id:"soc-06",category:"society",tier:2,type:"multi",question:"Which TWO of the following are British Overseas Territories?",options:["Gibraltar","The Republic of Ireland","The Falkland Islands","France"],answer:[0,2],explanation:"Gibraltar and the Falkland Islands are British Overseas Territories. The Republic of Ireland is independent, and France is unconnected to the UK."},
  {id:"gov-01",category:"government",tier:1,type:"single",question:"The UK is best described as a:",options:["Republic","Constitutional monarchy","Federal state","Direct democracy"],answer:1,explanation:"The UK is a constitutional monarchy: the monarch is head of state, but elected representatives in Parliament make and pass laws."},
  {id:"gov-02",category:"government",tier:2,type:"single",question:"How many members does the Northern Ireland Assembly have?",options:["90","108","129","60"],answer:0,explanation:"The Northern Ireland Assembly has 90 members (MLAs) — five for each of the 18 constituencies. It was reduced from 108 in 2017.",volatile:true},
  {id:"gov-03",category:"government",tier:2,type:"single",question:"What is the official London home of the Prime Minister?",options:["Buckingham Palace","10 Downing Street","The Houses of Parliament","Whitehall"],answer:1,explanation:"The Prime Minister's official residence is 10 Downing Street in London."},
  {id:"gov-04",category:"government",tier:3,type:"single",question:"At least how often must a UK general election be held?",options:["Every 3 years","Every 4 years","Every 5 years","Every 7 years"],answer:2,explanation:"A general election must be held at least every five years."},
  {id:"gov-05",category:"government",tier:2,type:"single",question:"The two Houses of the UK Parliament are the House of Commons and the:",options:["House of Lords","Senate","Supreme Court","Privy Council"],answer:0,explanation:"Parliament is made up of the House of Commons and the House of Lords, together with the monarch."},
  {id:"gov-06",category:"government",tier:3,type:"single",question:"Members elected to the House of Commons are known as:",options:["Peers","Councillors","MPs (Members of Parliament)","Ministers"],answer:2,explanation:"People elected to represent constituencies in the House of Commons are called Members of Parliament, or MPs."},
  {id:"val-01",category:"values",tier:2,type:"single",question:"Which of the following is a fundamental principle of British life?",options:["Compulsory military service","The rule of law","A single official newspaper","State approval of all religions"],answer:1,explanation:"The rule of law is one of the fundamental principles of British life, alongside democracy, individual liberty, and tolerance of others."},
  {id:"val-02",category:"values",tier:3,type:"single",question:"Which of these is described as a responsibility of those living in the UK?",options:["Voting for the governing party","Treating others with fairness and respect","Joining a political party","Attending a place of worship weekly"],answer:1,explanation:"Treating others with fairness and respect, and obeying the law, are responsibilities shared by everyone living in the UK."}
];

const CATEGORY_LABELS = {
  values:"Values & principles", "uk-overview":"What is the UK",
  history:"History", society:"Modern society", government:"Government & law"
};

/* ============================================================
   STATE
   ============================================================ */
const TOTAL = 24, PASS = 18, MINUTES = 45;
let questions = [], answers = [], flags = new Set(), cur = 0;
let remaining = MINUTES*60, ticker = null;
const app = document.getElementById('app');

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ============================================================
   START SCREEN
   ============================================================ */
function renderStart(){
  stopTimer();
  app.innerHTML = `
    <div class="mark"><span class="dot">✓</span><span class="name">CitSure</span></div>
    <div class="hero">
      <p class="eyebrow">Life in the UK Test</p>
      <h1 class="display">Practise the real test, the honest way.</h1>
      <p class="lead">A timed mock built exactly like the real exam — 24 questions, 45 minutes, with a clear explanation for every answer.</p>
      <div class="facts">
        <div class="fact"><span class="num">24</span><span class="lbl">questions</span></div>
        <div class="fact"><span class="num">45</span><span class="lbl">minutes</span></div>
        <div class="fact"><span class="num">18</span><span class="lbl">to pass</span></div>
      </div>
      <button class="btn" id="startBtn">Start mock test</button>
      <p class="guide-link"><a href="how-it-works.html">New to the test? Read how it works →</a></p>
      <p class="note">Independent practice tool. Not affiliated with, endorsed by, or connected to the Home Office or UK Government. Questions are written from publicly available facts.</p>
    </div>`;
  document.getElementById('startBtn').onclick = startTest;
}

/* ============================================================
   TEST
   ============================================================ */
function startTest(){
  questions = shuffle(BANK).slice(0, Math.min(TOTAL, BANK.length));
  answers = questions.map(()=>null);
  flags = new Set(); cur = 0; remaining = MINUTES*60;
  startTimer();
  renderQuestion();
}

function startTimer(){
  stopTimer();
  ticker = setInterval(()=>{
    remaining--;
    updateTimer();
    if(remaining<=0){stopTimer(); finish();}
  },1000);
}
function stopTimer(){ if(ticker){clearInterval(ticker); ticker=null;} }
function fmt(s){const m=Math.floor(s/60), ss=s%60;return m+':'+String(ss).padStart(2,'0');}
function updateTimer(){
  const t=document.getElementById('timer');
  if(!t) return;
  t.querySelector('.tval').textContent = fmt(remaining);
  t.classList.toggle('low', remaining<=300);
}

function isAnswered(i){const a=answers[i];return Array.isArray(a)?a.length===2:a!==null;}

function renderQuestion(){
  const q = questions[cur];
  const sel = answers[cur];
  const pct = Math.round((cur)/questions.length*100);
  const flagged = flags.has(cur);
  const opts = q.options.map((o,i)=>{
    const on = Array.isArray(sel)? sel.includes(i) : sel===i;
    return `<button class="opt ${on?'sel':''}" data-i="${i}">
      <span class="key">${i+1}</span><span>${o}</span></button>`;
  }).join('');
  app.innerHTML = `
    <div class="topbar">
      <span class="progress-meta">Question <b>${cur+1}</b> of ${questions.length}</span>
      <span class="timer" id="timer"><span class="dotpulse"></span><span class="tval">${fmt(remaining)}</span></span>
    </div>
    <div class="track"><span style="width:${pct}%"></span></div>
    <div class="card">
      <p class="eyebrow q-cat">${CATEGORY_LABELS[q.category]||q.category}</p>
      <h2 class="q-text">${q.question}</h2>
      ${q.type==='multi'?'<p class="q-hint">Select two answers</p>':''}
      <div class="opts">${opts}</div>
      <div class="testnav">
        <button class="flagbtn ${flagged?'on':''}" id="flagBtn">${flagged?'★ Flagged':'☆ Flag for review'}</button>
        <div style="display:flex;gap:10px">
          ${cur>0?'<button class="btn ghost" id="backBtn">Back</button>':''}
          <button class="btn" id="nextBtn">${cur===questions.length-1?'Finish':'Next'}</button>
        </div>
      </div>
    </div>`;
  updateTimer();
  app.querySelectorAll('.opt').forEach(b=> b.onclick = ()=> choose(parseInt(b.dataset.i)));
  document.getElementById('nextBtn').onclick = next;
  const back=document.getElementById('backBtn'); if(back) back.onclick=()=>{cur--;renderQuestion();};
  document.getElementById('flagBtn').onclick = ()=>{ flags.has(cur)?flags.delete(cur):flags.add(cur); renderQuestion(); };
}

function choose(i){
  const q = questions[cur];
  if(q.type==='multi'){
    let a = Array.isArray(answers[cur])?answers[cur].slice():[];
    if(a.includes(i)) a = a.filter(x=>x!==i);
    else if(a.length<2) a.push(i);
    else a = [a[1], i];           // replace oldest when a third is picked
    answers[cur] = a;
  } else {
    answers[cur] = i;
  }
  renderQuestion();
}

function next(){
  if(cur===questions.length-1) finish();
  else { cur++; renderQuestion(); }
}

// keyboard 1–4
document.addEventListener('keydown', e=>{
  if(!questions.length) return;
  if(document.querySelector('.q-text')){
    if(['1','2','3','4'].includes(e.key)){
      const idx=parseInt(e.key)-1;
      if(idx < questions[cur].options.length) choose(idx);
    } else if(e.key==='Enter'){ next(); }
  }
});

/* ============================================================
   SCORING + RESULTS
   ============================================================ */
function isCorrect(q, a){
  if(q.type==='multi'){
    if(!Array.isArray(a)) return false;
    const want=[...q.answer].sort().join(','), got=[...a].sort().join(',');
    return want===got;
  }
  return a===q.answer;
}

function finish(){
  stopTimer();
  let correct=0;
  const byCat={};
  questions.forEach((q,i)=>{
    const ok=isCorrect(q,answers[i]);
    if(ok) correct++;
    const c=q.category;
    byCat[c]=byCat[c]||{ok:0,n:0};
    byCat[c].n++; if(ok) byCat[c].ok++;
  });
  const passed = correct>=PASS;
  const used = MINUTES*60 - Math.max(remaining,0);
  const pctFill = Math.round(correct/questions.length*100);
  const passPct = Math.round(PASS/questions.length*100);

  const topics = Object.keys(byCat).map(c=>{
    const {ok,n}=byCat[c]; const r=ok/n;
    const cls = r>=0.75?'':(r>=0.5?'low':'bad');
    return `<div class="topic">
      <span class="name">${CATEGORY_LABELS[c]||c}</span>
      <span class="bar"><span class="${cls}" style="width:${Math.round(r*100)}%"></span></span>
      <span class="frac">${ok}/${n}</span></div>`;
  }).join('');

  const review = questions.map((q,i)=>{
    const a=answers[i];
    const userIdx = q.type==='multi'?(Array.isArray(a)?a:[]):(a===null?[]:[a]);
    const correctIdx = q.type==='multi'?q.answer:[q.answer];
    const lines = q.options.map((o,oi)=>{
      const isRight=correctIdx.includes(oi);
      const isUser=userIdx.includes(oi);
      if(isRight) return `<div class="ans right"><span class="tick">✓</span><span>${o}${isUser?' — your answer':''}</span></div>`;
      if(isUser)  return `<div class="ans wrong"><span class="tick">✕</span><span>${o} — your answer</span></div>`;
      return '';
    }).join('');
    return `<div class="review-item">
      <p class="q">${i+1}. ${q.question}</p>
      ${lines}
      <p class="exp">${q.explanation}</p></div>`;
  }).join('');

  app.innerHTML = `
    <div class="mark"><span class="dot">✓</span><span class="name">CitSure</span></div>
    <div class="verdict ${passed?'pass':''}">
      <p class="eyebrow">${passed?'Pass':'Not yet'}</p>
      <h2 class="display">${passed?'You passed this mock.':'Not a pass this time.'}</h2>
      <p class="score-line">You scored <b>${correct} out of ${questions.length}</b> — the pass mark is ${PASS}. Time used: ${fmt(used)}.</p>
    </div>

    <div class="meter-wrap">
      <div class="meter">
        <div class="fill ${passed?'':'fail'}" style="width:${pctFill}%"></div>
        <div class="passline" style="left:${passPct}%"><span>pass · ${PASS}</span></div>
      </div>
      <div class="meter-scale"><span>0</span><span>${questions.length}</span></div>
    </div>

    <h3 class="section-h">How you did by topic</h3>
    ${topics}

    <h3 class="section-h">Review every question</h3>
    ${review}

    <div class="results-actions">
      <button class="btn" id="againBtn">Try another mock</button>
      <button class="btn ghost" id="homeBtn">Back to start</button>
    </div>`;
  document.getElementById('againBtn').onclick = startTest;
  document.getElementById('homeBtn').onclick = renderStart;
  window.scrollTo(0,0);
}

async function loadBank(){
  try{
    const res = await fetch('question-bank.json', {cache:'no-store'});
    if(res.ok){
      const data = await res.json();
      if(data && Array.isArray(data.questions) && data.questions.length){
        BANK = data.questions;            // JSON is the source of truth
      }
    }
  }catch(e){ /* fetch failed (e.g. opened from disk) — keep inline fallback */ }
  renderStart();
}
loadBank();
</script>
